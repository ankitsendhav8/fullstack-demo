<div class="max-w-3xl mx-auto py-16 px-6">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">Sign Up</h1>
        <p class="text-gray-600">
            Create an account to get started
        </p>
    </div>
    <div class="grid">
        <div class="bg-white shadow-lg rounded-xl p-8">
            <form class="space-y-6" [formGroup]="signupForm">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        First Name
                    </label>
                    <input type="text" formControlName="firstName" name="firstName" maxlength="50"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Last Name
                    </label>
                    <input type="text" formControlName="lastName" name="lastName" maxlength="50"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>
                    <input type="email" formControlName="email" name="email" maxlength="200"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>
                    <div class="relative">
                        <input [type]="showPassword ? 'text' : 'password'" formControlName="password" name="password"
                            maxlength="50"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 pr-10 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                        <button type="button" (click)="showPassword = !showPassword"
                            class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-500 hover:text-gray-700">
                            <i [class]="showPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
                        </button>
                    </div>
                </div>
                <button type="button" [disabled]="signupForm.invalid"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg transition enabled:hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
                    (click)="onClickSignup()">
                    Sign Up
                </button>
            </form>
            <p class="text-center text-sm text-gray-600 mt-6">
                Already have an account?
                <a routerLink="/login" class="text-blue-600 hover:underline font-medium">Login</a>
            </p>
        </div>
    </div>
</div>
