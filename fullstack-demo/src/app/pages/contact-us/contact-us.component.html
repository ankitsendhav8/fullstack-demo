<div class="max-w-3xl mx-auto py-16 px-6">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">Contact Us</h1>
        <p class="text-gray-600">
            Have questions or need support? We'd love to hear from you.
        </p>
    </div>
    <div class="grid ">
        <div class="bg-white shadow-lg rounded-xl p-8">
            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        First Name
                    </label>
                    <input type="text" [(ngModel)]="firstName" name="firstName"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Last Name
                    </label>
                    <input type="text" [(ngModel)]="lastName" name="lastName"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>
                    <input type="email" [(ngModel)]="email" name="email"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Message
                    </label>
                    <textarea rows="4" [(ngModel)]="description" name="description"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>
                <button type="button" [disabled]="firstName == '' || lastName == '' || email == '' || description == ''"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition" (click)="contactUsDetails()">
                    Send Message
                </button>
            </form>
        </div>
    </div>
</div>
